<title>Gallery | ArtWalk Deep Ellum Archive</title>

<style>
body {
    font-family: Georgia, serif;
    background: #f4f4f2;

.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 80px 24px;
}

h1 {
    font-weight: normal;
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));

}

.box {
    height: 160px;
    background: #ddd;
    border: 1px solid #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: #666;
}

a {
    color: #1f1f1f;
    text-decoration: none;
    border-bottom: 1px solid #aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>Gallery</h1>

<p>Placeholder grid for archival materials (photos, flyers, documentation).</p>
